name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install package
        run: python3 -m pip install -e .

      - name: Validate repository assets
        run: python3 scripts/validate.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Render sample binder
        run: python3 -m rv_logbook render examples/sample-trip.json output/sample-binder.md

      - name: Verify rendered binder exists
        run: test -s output/sample-binder.md

      - name: Render sample HTML report
        run: python3 -m rv_logbook render-html examples/sample-trip.json output/sample-report.html

      - name: Verify rendered HTML report exists
        run: test -s output/sample-report.html

      - name: Import sample fuel-stop CSV
        run: python3 -m rv_logbook import-csv fuel-stop examples/sample-fuel-stops.csv output/fuel-stops.json

      - name: Verify imported fuel-stop JSON exists
        run: test -s output/fuel-stops.json

      - name: Import sample RV Trip Wizard export
        run: python3 -m rv_logbook import-rtw examples/sample-rtw-export.json output/rtw-trip.json

      - name: Validate imported RV Trip Wizard trip
        run: python3 -m rv_logbook validate output/rtw-trip.json --schema trip

      - name: Verify imported RV Trip Wizard trip exists
        run: test -s output/rtw-trip.json

      - name: Merge sample fuel-stop records into trip
        run: python3 -m rv_logbook merge-records fuel-stop examples/sample-trip.json examples/sample-fuel-stops-merge.json output/merged-trip.json

      - name: Validate merged trip
        run: python3 -m rv_logbook validate output/merged-trip.json --schema trip

      - name: Verify merged trip exists
        run: test -s output/merged-trip.json

      - name: Ingest sample fuel-stop CSV directly into trip
        run: python3 -m rv_logbook ingest-csv fuel-stop examples/sample-trip.json examples/sample-fuel-stops-single.csv output/ingested-trip.json

      - name: Validate ingested trip
        run: python3 -m rv_logbook validate output/ingested-trip.json --schema trip

      - name: Verify ingested trip exists
        run: test -s output/ingested-trip.json
